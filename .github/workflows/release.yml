name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Create archive
        run: |
          cp target/release/trek-release trek-release-${{ github.ref_name }}
          tar czf trek-release-${{ github.ref_name }}.tar.gz trek-release-${{ github.ref_name }}
          sha256sum trek-release-${{ github.ref_name }}.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            trek-release-*.tar.gz
            checksums.txt
          generate_release_notes: true
